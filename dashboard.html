</head>

<body>

    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link active" href="dashboard.html">Dashboard</a></li>

      <div class="d-flex">

    <main class="container" style="padding-top:80px; padding-bottom:80px;">
        <h2 class="mb-4">Today's overview</h2>

        <div class="row g-4">
            <!-- Calories Card -->
            <div class="col-12 col-md-6">
                <div class="card h-100" id="calories-card" data-consumed="1600" data-target="2000">
                    <div class="card-header text-uppercase fw-bold text-primary">CALORIES</div>
                    <div class="card-body d-flex flex-column justify-content-center">
                        <div class="mb-3">
                            <strong id="calories-text" class="fs-4">1600 / 2000 kcal</strong>
                            <div class="small text-muted">Calories consumed vs daily target</div>
                        </div>
                        <div class="progress" style="height:20px;">
                            <div id="calories-progress" class="progress-bar bg-primary" role="progressbar" style="width:80%;"
                                aria-valuenow="1600" aria-valuemin="0" aria-valuemax="2000">80%</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Macros Card -->
            <div class="col-12 col-md-6">
                <div class="card h-100" id="macros-card">
                    <div class="card-header text-uppercase fw-bold text-success">MACROS</div>
                    <div class="card-body">
                        <!-- Protein -->
                        <div class="mb-3">
                            <div class="d-flex justify-content-between mb-1">
                                <span>Protein</span>
                                <strong>80g / 120g</strong>
                            </div>
                            <div class="progress" style="height:12px;">
                                <div class="progress-bar bg-info" role="progressbar" style="width: 66%;" aria-valuenow="80" aria-valuemin="0" aria-valuemax="120"></div>
                            </div>
                        </div>
                        <!-- Carbs -->
                        <div class="mb-3">
                            <div class="d-flex justify-content-between mb-1">
                                <span>Carbs</span>
                                <strong>150g / 200g</strong>
                            </div>
                            <div class="progress" style="height:12px;">
                                <div class="progress-bar bg-warning" role="progressbar" style="width: 75%;" aria-valuenow="150" aria-valuemin="0" aria-valuemax="200"></div>
                            </div>
                        </div>
                        <!-- Fats -->
                        <div class="mb-1">
                            <div class="d-flex justify-content-between mb-1">
                                <span>Fats</span>
                                <strong>40g / 65g</strong>
                            </div>
                            <div class="progress" style="height:12px;">
                                <div class="progress-bar bg-danger" role="progressbar" style="width: 61%;" aria-valuenow="40" aria-valuemin="0" aria-valuemax="65"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-light py-3 fixed-bottom">
