    <main class="container" style="padding-top:80px; padding-bottom:80px;">
    <div>

            <div class="input-group mb-3">
                <input id="new-item" type="text" class="form-control" placeholder="Add item name">
                <button class="btn btn-primary" type="button">Add</button>
            </div>

            <!-- Mock list: checkboxes + labels (labels are crossed via CSS when checked) -->
            <ul class="list-group">
                <li class="list-group-item">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="" id="item-1">
                        <label class="form-check-label ms-2" for="item-1">Milk</label>
                    </div>
                </li>
                <li class="list-group-item">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="" id="item-2">
                        <label class="form-check-label ms-2" for="item-2">Eggs</label>
                    </div>
                </li>
                <li class="list-group-item">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="" id="item-3">
