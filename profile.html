      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>

      <div class="d-flex">

    <!-- Account Information -->
    <main class="container" style="padding-top:80px; padding-bottom:80px;">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6">
                <div class="card">
                    <div class="card-header text-uppercase">ACCOUNT</div>
                    <div class="card-body">
                        <h5 class="card-title mb-1">John Doe</h5>
                        <p class="card-text text-muted mb-0">john.doe@example.com</p>
                    </div>
                </div>
            </div>
        </div>
        <!-- Nutritional Goals -->
        <div class="row justify-content-center mt-4">
            <div class="col-12 col-md-6">
                <div class="card">
                    <div class="card-header text-uppercase">NUTRITIONAL GOALS</div>
                    <div class="card-body">
                        <form>
                            <div class="mb-3">
                                <label for="daily-calories" class="form-label">Daily calorie target</label>
                                <input id="daily-calories" name="daily-calories" type="number" min="0"
                                    class="form-control" placeholder="e.g. 2000">
                            </div>

                            <div class="mb-3">
                                <label for="goal" class="form-label">Goal</label>
                                <select id="goal" name="goal" class="form-select">
                                    <option value="lose">Lose weight</option>
                                    <option value="maintain">Maintain weight</option>
                                    <option value="gain">Gain weight</option>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-primary">Save</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-light py-3 fixed-bottom">
  <div class="container text-center">
    <span class="text-muted small">&copy; 2026 NutriPlan. All rights reserved.</span>
