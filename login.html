<body>
    <!-- Navigation Bar -->

  <div class="container">

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="meals.html">Meals</a></li>

      <div class="d-flex">

    <!-- Login form -->
    <main class="container" style = "padding-top: 80px; padding-bottom: 80px;">
        <div class="card shadow-lg" style="max-width: 400px; margin:auto">
            <form class="p-4">
                <h3 class="mb-3 text-center">Log in</h3>
                <div class="mb-4">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter your email">
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Enter your password">
                </div>
                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label" for="remember">Remember me</label>
                </div>
                <button type="submit" class="btn btn-primary w-100">Log in</button>
                <div class="text-center mt-3 small">
                    <a href="register.html">Don't have an account? Sign up</a>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-light py-3 mt-4">
